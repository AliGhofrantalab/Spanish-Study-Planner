<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spanish Study Planner</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Spanish Study Planner</h1>
      <input
        type="text"
        id="taskInput"
        placeholder="Enter Your Today's Study Task ..."
      />
      <button id="addBtn">Add Task</button>
      <div class="tasksContainer">
        <h3>Today's Tasks</h3>
        <ul id="taskList"></ul>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
